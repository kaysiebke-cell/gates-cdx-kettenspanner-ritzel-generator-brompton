name: Deploy web/ to GitHub Pages

# Der Online-Generator liegt in web/. GitHub-Pages-Branch-Deploy kann nur
# root oder /docs, deshalb wird web/ hier per Actions deployed.
#
# Die *.bundle.js werden NICHT ins Repo committet, sondern hier aus den
# Quelldateien (web/js/*.js) mit esbuild gebaut und anschliessend deployt.
# So bleibt die ausgelieferte Version immer in sync mit den Quellen.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "package.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Exakt gepinnte Dev-Abhaengigkeiten (esbuild, three, three-bvh-csg)
      # aus package.json installieren und Bundles nach web/js/ bauen.
      - name: Abhaengigkeiten installieren
        run: npm install
      - name: Bundles bauen (esbuild)
        run: npm run build:shell && npm run build:viewer
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
