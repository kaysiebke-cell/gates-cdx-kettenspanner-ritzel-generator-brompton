name: Ritzel bauen (headless)

# Der Web-Generator kann diesen Build per Vermittler (worker/) mit eigenen
# Werten anstossen, um STEP fuer nicht-Standard-Parameter zu erzeugen.
# Die client_id landet im run-name, damit der Vermittler genau diesen Lauf
# wiederfindet.
run-name: Ritzel bauen ${{ inputs.client_id }}

on:
  workflow_dispatch:
    inputs:
      params_json:
        description: >
          Parameter als JSON-Objekt (nur Abweichungen vom Standard noetig).
          Beispiel: {"zaehne": 16, "bohrung_d": 14, "breite": 11}
        required: false
        default: "{}"
      client_id:
        description: >
          Korrelations-ID des Web-Vermittlers (worker/). Optional; nur fuer
          On-Demand-STEP-Builds gesetzt, damit der Lauf wiederfindbar ist.
        required: false
        default: ""
  # Selbsttest: bei Aenderungen an der Baulogik einmal mit
  # Standardwerten durchlaufen
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-ritzel.yml"
      - "freecad/build_headless.py"
      - "freecad/render_gui_preview.py"
      - "freecad/ritzel_params.py"
      - "freecad/zahnrad_generator.py"
      - "freecad/zahnrad_params.py"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PARAMS_JSON: ${{ github.event.inputs.params_json }}
      OUTPUT_DIR: output
      # Software-OpenGL erzwingen: unter Xvfb gibt es keine echte GPU,
      # ohne diese Variable schlaegt Coin3D beim Rendern haeufig fehl.
      LIBGL_ALWAYS_SOFTWARE: "1"

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      # Ubuntu 24.04 hat kein freecad-Paket mehr -> offizielles AppImage
      # in FreeCAD 1.1.1 verwenden (gleiche Version wie lokal entwickelt).
      - name: FreeCAD 1.1.1 (AppImage) + virtueller Bildschirm installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb mesa-utils libgl1-mesa-dri
          wget -q -O FreeCAD.AppImage \
            "https://github.com/FreeCAD/FreeCAD/releases/download/1.1.1/FreeCAD_1.1.1-Linux-x86_64-py311.AppImage"
          chmod +x FreeCAD.AppImage
          # Extrahieren statt mounten: braucht kein FUSE im Runner
          ./FreeCAD.AppImage --appimage-extract > /dev/null
          echo "$PWD/squashfs-root/usr/bin" >> "$GITHUB_PATH"

      - name: STEP + STL bauen
        run: |
          freecadcmd freecad/build_headless.py

      # Render braucht das GUI-Binary (freecadcmd hat kein Coin3D/OpenGL);
      # schlaegt er fehl, gibt es trotzdem STEP+STL als Artifact.
      - name: Render-Vorschau erzeugen (echter FreeCAD-Viewport-Look)
        continue-on-error: true
        run: |
          xvfb-run -a freecad freecad/render_gui_preview.py

      - name: Ergebnis als Artifact bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: ritzel-export
          path: output/
          if-no-files-found: error

      # Nur die STEP-Dateien als eigenes Artifact — der Web-Vermittler
      # (worker/) laedt genau dieses und reicht es als ZIP an den Browser
      # durch (Ritzel + Buegel). Kein Rendern/STL noetig.
      - name: STEP fuer Web-Download bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: step-download
          path: |
            output/ritzel_z*.step
            output/riemenschutz_z*.step
          if-no-files-found: error
